<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Searloc</title>
    <link rel="icon" type="image/svg+xml" href="/search.svg" />
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="node_modules/@fortawesome/fontawesome-free/css/all.min.css">
    <link rel="search" type="application/opensearchdescription+xml" title="Searloc" href="/opensearch.xml" />
    <meta
      name="description"
      content="A fast, local randomizer for searXNG instances and for !!external bang users"
    />
</head>
<body>
    <header>
        <div class="header-links">
        </div>
    </header>

    <main>
        <div class="search-container">
            <h1 class="logo">Searloc</h1>
            <form action="/" method="get" class="search-box">
                <input type="text" name="q" placeholder="Search..." id="search-input">
                <button type="submit"><i class="fas fa-search"></i></button>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p data-i18n="footer"></p>
            <p>
                <a href="https://codeberg.org/wazaby/searloc" target="_blank" data-i18n="source"></a> | 
                <a href="https://codeberg.org/wazaby/searloc/issues" target="_blank" data-i18n="issue"></a> | 
                <a href="/about.html#legal-notice" data-i18n="legal"></a> | 
                <a href="https://searx.space/" target="_blank" data-i18n="instances_references"></a>
            </p>
        </div>
    </footer>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
